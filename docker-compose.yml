services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dbperf
      POSTGRES_USER: dbperf
      POSTGRES_PASSWORD: dbperf
    ports:
      # Published on 5433 to avoid clashing with a locally installed PostgreSQL
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbperf"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Demo TARGET database the assistant monitors during the hackathon demo:
  # realistic e-commerce data with deliberately missing indexes.
  demo-target:
    image: postgres:16-alpine
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all
    environment:
      POSTGRES_DB: shopdemo
      POSTGRES_USER: shopadmin
      POSTGRES_PASSWORD: shopadmin
    ports:
      - "5434:5432"
    volumes:
      - ./demo/init-demo-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopadmin -d shopdemo"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/dbperf
      DB_USERNAME: dbperf
      DB_PASSWORD: dbperf
      JWT_SECRET: local-compose-jwt-secret-0123456789abcdef
      # Export ANTHROPIC_API_KEY and/or GEMINI_API_KEY in your shell to enable AI features.
      # With both set, AI_PROVIDER picks (anthropic|gemini); default prefers Anthropic.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      APP_AI_MODEL: ${APP_AI_MODEL:-claude-opus-4-8}
      APP_GEMINI_MODEL: ${APP_GEMINI_MODEL:-gemini-3.5-flash}
      # AI_PROVIDER=ollama uses a local model; host.docker.internal reaches the host's Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 80
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
