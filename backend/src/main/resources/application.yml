spring:
  application:
    name: dbperf-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/dbperf}
    username: ${DB_USERNAME:dbperf}
    password: ${DB_PASSWORD:dbperf}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    # Min 32 characters. ALWAYS override via env/Secret Manager outside local dev.
    secret: ${JWT_SECRET:dev-only-jwt-secret-change-me-0123456789abcdef}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  ai:
    # auto = Claude if ANTHROPIC_API_KEY is set, else Gemini if GEMINI_API_KEY is set
    provider: ${AI_PROVIDER:auto}
    api-key: ${ANTHROPIC_API_KEY:}
    gemini-api-key: ${GEMINI_API_KEY:}
    model: ${APP_AI_MODEL:claude-opus-4-8}
    gemini-model: ${APP_GEMINI_MODEL:gemini-3.5-flash}
    # Local models: AI_PROVIDER=ollama (explicit opt-in, never auto-selected)
    ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    ollama-model: ${OLLAMA_MODEL:qwen2.5:1.5b}
    max-tokens: ${APP_AI_MAX_TOKENS:16000}
  collector:
    enabled: ${COLLECTOR_ENABLED:true}
    interval-ms: ${COLLECTOR_INTERVAL_MS:300000}     # 5 min between passes
    initial-delay-ms: ${COLLECTOR_INITIAL_DELAY_MS:60000}
  secrets:
    # "local" = AES-GCM with the key below (dev). "gcp" = Google Secret Manager.
    provider: ${SECRETS_PROVIDER:local}
    local-encryption-key: ${LOCAL_ENCRYPTION_KEY:dev-only-encryption-key-0123456789}
    gcp-project-id: ${GCP_PROJECT_ID:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{userId:-anonymous}] %logger{36} - %msg%n"
  level:
    com.dbperf: INFO
